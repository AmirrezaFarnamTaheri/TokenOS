name: CI

on:
  push:
    branches: [genspark_ai_developer, "feat/**"]
    tags: ["v*"] # release job only fires on version tags
  pull_request:
    branches: [genspark_ai_developer]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Core kernel: format, lint, test (headless — no GUI deps needed)
  # ---------------------------------------------------------------
  test:
    name: Test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        # Advisory only: surfaces formatting drift without failing the gate.
        # Run `cargo fmt --all` locally to clear it, then flip to blocking.
        run: cargo fmt --all -- --check
        continue-on-error: true
      - name: Clippy (blocking — warnings are errors)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --release --locked
      - name: Test
        run: cargo test --release --locked

  # ---------------------------------------------------------------
  # Supply-chain security: advisory DB audit + license/ban policy
  # ---------------------------------------------------------------
  security-audit:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit
      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny --locked
      - name: cargo audit (RUSTSEC advisories)
        run: cargo audit --deny warnings
      - name: cargo deny (licenses, bans, sources, advisories)
        run: cargo deny check

  # ---------------------------------------------------------------
  # Native desktop shell: build per-OS with the system webview deps
  # ---------------------------------------------------------------
  native:
    name: Native app (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # "-latest" labels are intentionally dynamic (macos-latest is
          # currently ARM64 and may migrate again); the arch suffix is
          # derived from runner.arch at upload time so artifact names can
          # never drift from the actual binary.
          - os: ubuntu-latest
            artifact: tokenos-linux
            binary: target/release/tokenos
          - os: macos-latest
            artifact: tokenos-macos
            binary: target/release/tokenos
          - os: windows-latest
            artifact: tokenos-windows
            binary: target/release/tokenos.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: native-${{ matrix.os }}
      - name: Install WebKitGTK (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - name: Build native app
        run: cargo build --release --locked --features native
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./${{ matrix.binary }} --version
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\target\release\tokenos.exe --version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # runner.arch (X64 / ARM64) keeps the name truthful even when a
          # "-latest" label migrates architectures.
          name: ${{ matrix.artifact }}-${{ runner.arch }}
          path: ${{ matrix.binary }}
          retention-days: 14

  # ---------------------------------------------------------------
  # Release: attach native binaries to tagged releases
  # ---------------------------------------------------------------
  release:
    name: Attach release binaries
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Package
        run: |
          cd dist
          for d in */; do
            name="${d%/}"
            (cd "$d" && tar -czf "../${name}.tar.gz" .)
          done
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
