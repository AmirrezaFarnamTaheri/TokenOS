name: CI

on:
  push:
    branches: [genspark_ai_developer, "feat/**"]
    tags: ["v*"] # release job only fires on version tags
  pull_request:
    branches: [genspark_ai_developer]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------
  # Core kernel: format, lint, test (headless — no GUI deps needed)
  # ---------------------------------------------------------------
  test:
    name: Test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
        continue-on-error: true # legacy formatting drift; informative only
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true # informative until the lint debt is cleared
      - name: Build
        run: cargo build --release --locked
      - name: Test
        run: cargo test --release --locked

  # ---------------------------------------------------------------
  # Native desktop shell: build per-OS with the system webview deps
  # ---------------------------------------------------------------
  native:
    name: Native app (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: tokenos-linux-x86_64
            binary: target/release/tokenos
          - os: macos-latest
            artifact: tokenos-macos-aarch64
            binary: target/release/tokenos
          - os: windows-latest
            artifact: tokenos-windows-x86_64
            binary: target/release/tokenos.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: native-${{ matrix.os }}
      - name: Install WebKitGTK (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - name: Build native app
        run: cargo build --release --locked --features native
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./${{ matrix.binary }} --version
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\target\release\tokenos.exe --version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          retention-days: 14

  # ---------------------------------------------------------------
  # Release: attach native binaries to tagged releases
  # ---------------------------------------------------------------
  release:
    name: Attach release binaries
    if: startsWith(github.ref, 'refs/tags/v')
    needs: native
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Package
        run: |
          cd dist
          for d in */; do
            name="${d%/}"
            (cd "$d" && tar -czf "../${name}.tar.gz" .)
          done
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
