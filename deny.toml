# cargo-deny policy for TokenOS.
# Run locally with: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Pull from the RUSTSEC advisory DB; fail on any unfixed vulnerability.
version = 2
yanked = "deny"
ignore = []

[licenses]
# Permissive licenses only — keeps the binary safe to ship/redistribute.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# Flag accidental duplicate major versions and wildcard deps.
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []

[sources]
# Only crates.io is trusted by default; unknown registries/git are rejected.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
